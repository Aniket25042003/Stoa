services:
  - type: keyvalue
    name: stoa-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: stoa-intelligence-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: services/api
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - fromService:
          type: keyvalue
          name: stoa-redis
          property: connectionString
        key: REDIS_URL
      - fromService:
          type: keyvalue
          name: stoa-redis
          property: connectionString
        key: CELERY_BROKER_URL
      - fromService:
          type: keyvalue
          name: stoa-redis
          property: connectionString
        key: CELERY_RESULT_BACKEND
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: INVITE_TOKEN_PEPPER
        sync: false
      - key: INTERNAL_PROXY_SECRET
        sync: false
      - key: INTEGRATION_CREDENTIALS_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://stoaai.app
      - key: CORS_ORIGINS
        value: https://stoaai.app
      - key: STOA_ENV
        value: production
      - key: REDIS_REQUIRE_TLS
        value: "true"
      - key: STOA_LLM_PROVIDER
        value: vertex
      - key: STOA_LLM_AUTO_FAILOVER
        value: "true"
      - key: GTM_VERTEX_PROJECT
        sync: false
      - key: GTM_VERTEX_LOCATION
        value: us-central1
      - key: GTM_VERTEX_MODEL
        value: gemini-2.5-pro
      - key: GTM_VERTEX_MODEL_FAST
        value: gemini-2.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "false"
      - key: LANGSMITH_PROJECT
        value: stoa-intelligence

databases: []
