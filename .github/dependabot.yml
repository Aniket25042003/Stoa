version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /services/core
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
