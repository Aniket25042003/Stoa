  name: Stoa
  slug: stoa-demo
  website_url: https://stoa-analytics.demo
  industry: B2B SaaS - Marketing Analytics
  profile:
    target_customers: VP Marketing and Head of Growth at 50–500 employee B2B SaaS companies
    business_model: PLG with sales-assisted expansion
    stage: Series A growth
    goals:
      - improve win rate on enterprise deals
      - shorten sales cycle by 20%
      - align paid and organic attribution
    brand_voice: confident, data-driven, plain language
    known_competitors_notes: InsightLoop, PipelineIQ, RevTrack

