campaigns:
  - slug: q3-launch
    brief: Q3 product launch — unified attribution dashboard for B2B SaaS marketers
    status: completed
    assets:
      headline: "See which campaigns actually drive pipeline — in one dashboard"
      emails:
        - subject: "Your campaigns are working. Can you prove it?"
          body: "Introducing unified attribution for HubSpot + GA4..."
        - subject: "3-minute walkthrough: Q3 dashboard"
          body: "Watch how VP Marketing teams cut reporting time by 60%..."
      social:
        - platform: linkedin
          text: "Stop exporting CSVs. Stoa connects HubSpot, Gong, and GA4 so you know what drives revenue."
      battlecard:
        vs: InsightLoop
        differentiators:
          - "Native Gong + HubSpot alignment"
          - "Precomputed insights, not chat-only"
        objections:
          - objection: "We already have HubSpot dashboards"
            response: "HubSpot shows activity; Stoa connects activity to revenue and call evidence."
  - slug: webinar-june
    brief: Webinar follow-up nurture — attribution masterclass attendees
    status: running
    assets: {}
  - slug: partner-cobrand
    brief: Partner co-marketing with RevOps Alliance
    status: failed
    error: "Missing partner brand assets — generation aborted"
    assets: {}
  - slug: competitive-displacement
    brief: Competitive displacement campaign vs InsightLoop
    status: queued
    assets: {}

